name: 构建并发布

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:
    inputs:
      version_name:
        description: '版本号（如 1.0.0）— 仅创建 Release 时需要填写'
        required: false
        default: ''
      version_code:
        description: '版本代码 — 仅创建 Release 时需要填写'
        required: false
        default: ''
      create_release:
        description: '创建 GitHub Release'
        required: true
        type: boolean
        default: false

env:
  KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
  ALIAS: ${{ secrets.ALIAS }}
  KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

jobs:
  build:
    name: 构建 APK
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置版本信息
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.create_release }}" = "true" ]; then
            echo "version_name=${{ inputs.version_name }}" >> $GITHUB_OUTPUT
            echo "version_code=${{ inputs.version_code }}" >> $GITHUB_OUTPUT
          else
            echo "version_name=manual-$(date +%s)" >> $GITHUB_OUTPUT
            echo "version_code=$(date +%s)" >> $GITHUB_OUTPUT
          fi

      - name: 设置 JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: 授予 gradlew 执行权限
        run: chmod +x gradlew

      - name: 构建 Release APK
        env:
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
        run: ./gradlew assembleRelease --stacktrace --no-daemon

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: LogFox-${{ steps.version.outputs.version_name }}
          compression-level: 0
          path: app/build/outputs/apk/release/LogFox-*.apk

  release:
    name: 创建 GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.create_release }}
    permissions:
      contents: write
    steps:
      - name: 下载 APK
        uses: actions/download-artifact@v4
        with:
          name: LogFox-${{ inputs.version_name }}
          path: ./apk

      - name: 直接上传 APK 到 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version_name }}
          name: ${{ inputs.version_name }}
          files: ./apk/*.apk
          generate_release_notes: true

name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.0.0) — only needed when creating a release'
        required: false
        default: ''
      version_code:
        description: 'Version code — only needed when creating a release'
        required: false
        default: ''
      create_release:
        description: 'Create GitHub Release'
        required: true
        type: boolean
        default: false

env:
  KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
  ALIAS: ${{ secrets.ALIAS }}
  KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

jobs:
  prepare:
    name: Prepare Version Info
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.set.outputs.version_name }}
      version_code: ${{ steps.set.outputs.version_code }}
    steps:
      - name: Set version info
        id: set
        run: |
          if [ "${{ inputs.create_release }}" = "true" ]; then
            if [ -z "${{ inputs.version_name }}" ] || [ -z "${{ inputs.version_code }}" ]; then
              echo "version_name and version_code are required when create_release is enabled" >&2
              exit 1
            fi
            echo "version_name=${{ inputs.version_name }}" >> $GITHUB_OUTPUT
            echo "version_code=${{ inputs.version_code }}" >> $GITHUB_OUTPUT
          else
            echo "version_name=manual-$(date +%s)" >> $GITHUB_OUTPUT
            echo "version_code=$(date +%s)" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build APK
    runs-on: ubuntu-latest
    needs: prepare
    env:
      VERSION_NAME: ${{ needs.prepare.outputs.version_name }}
      VERSION_CODE: ${{ needs.prepare.outputs.version_code }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LogFox-${{ needs.prepare.outputs.version_name }}
          compression-level: 0
          path: app/build/outputs/apk/release/LogFox-*.apk

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare, build]
    if: ${{ inputs.create_release }}
    permissions:
      contents: write
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: LogFox-${{ needs.prepare.outputs.version_name }}
          path: ./apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version_name }}
          name: ${{ needs.prepare.outputs.version_name }}
          files: ./apk/*.apk
          generate_release_notes: true
